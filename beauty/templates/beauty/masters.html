{% extends 'beauty/base.html' %}

{% block content %}
<div class="row">
    <div class="col-12">
        <h1 class="text-center mb-4">Наши мастера</h1>
    </div>
    {% for master in masters %}
    <div class="col-md-4 mb-4">
        <div class="card h-100 shadow-sm text-center">
            <div class="card-body">
                <i class="fas fa-user-circle fa-4x text-primary mb-3"></i>
                <h4 class="card-title">{{ master.name }}</h4>
                <p class="card-text">{{ master.specialization|default:"Специалист широкого профиля" }}</p>
                <p class="card-text small text-muted">{{ master.bio|truncatewords:20 }}</p>
                <a href="{% url 'beauty:master_detail' master.id %}" class="btn btn-primary">Подробнее</a>
            </div>
        </div>
    </div>
    {% empty %}
    <p class="text-center">Мастера пока не добавлены</p>
    {% endfor %}
</div>
{% endblock %}
